<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisionTalk</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; }

        .camera-panel { flex: 0 0 65%; display: flex; flex-direction: column; background: #000; position: relative; }
        .camera-panel video { width: 100%; height: 100%; object-fit: cover; }
        .camera-panel .status { position: absolute; top: 12px; left: 12px; padding: 4px 10px; border-radius: 12px; font-size: 12px; background: rgba(0,0,0,0.6); }
        .camera-panel .status.live { color: #2ecc71; }
        .camera-panel .status.off { color: #e74c3c; }

        .chat-panel { flex: 1; display: flex; flex-direction: column; min-width: 300px; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
        .chat-messages::-webkit-scrollbar { width: 6px; }
        .chat-messages::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
        .chat-messages .empty { text-align: center; color: #555; margin-top: 40px; }
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.5; }
        .msg.user { align-self: flex-end; background: #2563eb; color: #fff; border-bottom-right-radius: 4px; }
        .msg.ai { align-self: flex-start; background: #374151; color: #e5e7eb; border-bottom-left-radius: 4px; }
        .msg.system { align-self: center; background: transparent; color: #6b7280; font-size: 12px; }

        .ptt-area { padding: 16px; border-top: 1px solid #2d2d3f; display: flex; justify-content: center; }
        .ptt-btn { width: 64px; height: 64px; border-radius: 50%; border: none; cursor: pointer; font-size: 28px; background: #e74c3c; color: #fff; transition: all 0.2s; }
        .ptt-btn:hover { transform: scale(1.05); }
        .ptt-btn.recording { background: #c0392b; box-shadow: 0 0 0 6px rgba(231, 76, 60, 0.3); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 6px rgba(231, 76, 60, 0.3); } 50% { box-shadow: 0 0 0 14px rgba(231, 76, 60, 0); } }
        .ptt-label { text-align: center; font-size: 11px; color: #888; margin-top: 6px; }
    </style>
</head>
<body>
    <div class="camera-panel">
        <video id="camera" autoplay playsinline muted></video>
        <span class="status off" id="camStatus">📷 摄像头未就绪</span>
    </div>

    <div class="chat-panel">
        <div class="chat-messages" id="messages">
            <div class="empty">点击下方按钮开始对话</div>
        </div>
        <div class="ptt-area">
            <div style="display:flex;flex-direction:column;align-items:center;">
                <button class="ptt-btn" id="pttBtn" title="点击开始/停止录音">🎤</button>
                <p class="ptt-label" id="pttLabel">点击开始录音</p>
            </div>
        </div>
    </div>

    <script>
        // ── Camera ──
        const video = document.getElementById('camera');
        const camStatus = document.getElementById('camStatus');

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                video.srcObject = stream;
                camStatus.textContent = '📷 摄像头已就绪';
                camStatus.className = 'status live';
            } catch (e) {
                camStatus.textContent = '📷 需要摄像头权限';
                camStatus.className = 'status off';
            }
        }

        // ── WebSocket ──
        let ws;
        function connectWS() {
            ws = new WebSocket(`ws://${location.host}/ws`);
            ws.onopen = () => console.log('[WS] Connected');
            ws.onclose = () => {
                console.log('[WS] Disconnected, reconnecting in 2s...');
                setTimeout(connectWS, 2000);
            };
            ws.onerror = () => addMessage('system', '⚠️ 连接断开，正在重连...');
            ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                console.log('[WS] Server:', msg.type, msg.text || '');
                if (msg.type === 'status') {
                    addMessage('system', msg.text);
                } else if (msg.type === 'transcript') {
                    addMessage('user', msg.text);
                } else if (msg.type === 'stream') {
                    streamAppend(msg.text);
                } else if (msg.type === 'response') {
                    streamFinalize();
                    pttLabel.textContent = '点击开始录音';
                } else if (msg.type === 'timing') {
                    addMessage('system', `⏱ STT ${msg.stt} + LLM ${msg.llm} + ${msg.frames}帧 = ${msg.total}`);
                } else if (msg.type === 'error') {
                    streamFinalize();
                    addMessage('system', '⚠️ ' + msg.text);
                    pttLabel.textContent = '点击开始录音';
                }
            };
        }
        connectWS();

        // ── Audio Recording ──
        let audioChunks = [];
        let audioStream = null;

        async function getAudioStream() {
            if (audioStream) return audioStream;
            audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            return audioStream;
        }

        async function startRecording() {
            const stream = await getAudioStream();
            const audioCtx = new AudioContext({ sampleRate: 16000 });
            window._audioSampleRate = audioCtx.sampleRate;  // actual rate (may differ from requested)
            const source = audioCtx.createMediaStreamSource(stream);
            const processor = audioCtx.createScriptProcessor(4096, 1, 1);

            audioChunks = [];
            processor.onaudioprocess = (e) => {
                if (!isRecording) return;
                const input = e.inputBuffer.getChannelData(0);
                audioChunks.push(new Float32Array(input));
            };

            source.connect(processor);
            processor.connect(audioCtx.destination);
            window._audioCtx = audioCtx;
            window._processor = processor;
        }

        function stopRecording() {
            if (window._processor) {
                window._processor.disconnect();
            }
            if (window._audioCtx) {
                window._audioCtx.close();
            }
            audioChunks = [];
        }

        function arrayBufferToBase64(buffer) {
            const bytes = new Uint8Array(buffer);
            const CHUNK = 0x8000;  // 32KB chunks, avoids call stack overflow
            let binary = '';
            for (let i = 0; i < bytes.length; i += CHUNK) {
                binary += String.fromCharCode.apply(null, bytes.subarray(i, i + CHUNK));
            }
            return btoa(binary);
        }

        function encodeWAV(samples, sampleRate) {
            const numSamples = samples.length;
            const buffer = new ArrayBuffer(44 + numSamples * 2);
            const view = new DataView(buffer);

            const writeStr = (off, str) => { for (let i = 0; i < str.length; i++) view.setUint8(off + i, str.charCodeAt(i)); };
            writeStr(0, 'RIFF');
            view.setUint32(4, 36 + numSamples * 2, true);
            writeStr(8, 'WAVE');
            writeStr(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeStr(36, 'data');
            view.setUint32(40, numSamples * 2, true);

            for (let i = 0; i < numSamples; i++) {
                const s = Math.max(-1, Math.min(1, samples[i]));
                view.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
            }
            return buffer;
        }

        // ── Frame Capture ──
        const FRAME_INTERVAL_IDLE = 2000;
        const FRAME_INTERVAL_SPEECH = 500;
        const FRAME_MAX_WIDTH = 384;
        const FRAME_JPEG_QUALITY = 0.55;
        const FRAME_WINDOW_SECONDS = 15;  // time-based sliding window

        // frameBuffer: [{base64, timestamp, hash, isAction}, ...]
        let frameBuffer = [];
        let frameTimer = null;
        let lastPHash = null;  // BigInt perceptual hash

        // ── Perceptual Hash (pHash) ──
        function pHash(imageData, size) {
            // Downsample to size×size grayscale
            const pixels = [];
            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    const sx = Math.floor(x * imageData.width / size);
                    const sy = Math.floor(y * imageData.height / size);
                    const i = (sy * imageData.width + sx) * 4;
                    pixels.push(0.299 * imageData.data[i] + 0.587 * imageData.data[i+1] + 0.114 * imageData.data[i+2]);
                }
            }
            // Average hash: compare each pixel to mean
            const mean = pixels.reduce((a, b) => a + b, 0) / pixels.length;
            let hash = BigInt(0);
            for (let i = 0; i < 64; i++) {
                if (pixels[Math.floor(i * pixels.length / 64)] > mean) {
                    hash |= (1n << BigInt(i));
                }
            }
            return hash;
        }

        function hammingDistance(a, b) {
            let xor = a ^ b;
            let count = 0;
            while (xor) { count++; xor &= (xor - 1n); }
            return count;
        }

        const DEDUP_HAMMING_THRESHOLD = 8;  // < 8 bits diff = duplicate

        function captureFrame() {
            if (!video.videoWidth || !video.videoHeight) return;
            const canvas = document.createElement('canvas');
            const rawW = video.videoWidth;
            const rawH = video.videoHeight;
            const scale = Math.min(1, FRAME_MAX_WIDTH / rawW);
            canvas.width = Math.round(rawW * scale);
            canvas.height = Math.round(rawH * scale);
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // pHash dedup
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const phash = pHash(imgData, 32);
            if (lastPHash !== null && hammingDistance(phash, lastPHash) < DEDUP_HAMMING_THRESHOLD) return;
            lastPHash = phash;

            const jpeg = canvas.toDataURL('image/jpeg', FRAME_JPEG_QUALITY);
            const base64 = jpeg.split(',')[1];
            const now = Date.now();
            frameBuffer.push({ base64, timestamp: now, hash: phash, isAction: false });
            // Purge frames older than window
            const cutoff = now - FRAME_WINDOW_SECONDS * 1000;
            frameBuffer = frameBuffer.filter(f => f.timestamp > cutoff);
        }

        function startFrameCapture(interval) {
            stopFrameCapture();
            captureFrame();
            frameTimer = setInterval(captureFrame, interval);
        }

        function stopFrameCapture() {
            if (frameTimer) {
                clearInterval(frameTimer);
                frameTimer = null;
            }
        }

        function getFramesForLLM(durationSeconds) {
            let count;
            if (durationSeconds <= 3) count = 3;
            else if (durationSeconds <= 10) count = 5;
            else if (durationSeconds <= 20) count = 8;
            else count = 10;
            let selected;
            if (frameBuffer.length <= count) {
                selected = [...frameBuffer];
            } else {
                const step = (frameBuffer.length - 1) / (count - 1);
                const indices = [];
                for (let i = 0; i < count - 1; i++) indices.push(Math.floor(i * step));
                indices.push(frameBuffer.length - 1);
                selected = indices.map(i => frameBuffer[i]);
            }
            // Secondary dedup on frame objects
            const deduped = [selected[0]];
            for (let i = 1; i < selected.length; i++) {
                const mid = (f) => f.base64.substring(f.base64.length >> 1, (f.base64.length >> 1) + 200);
                if (mid(selected[i]) !== mid(selected[i - 1])) {
                    deduped.push(selected[i]);
                }
            }
            // Return base64 strings
            return deduped.map(f => f.base64);
        }

        // ── Messages ──
        function addMessage(role, text) {
            const container = document.getElementById('messages');
            const empty = container.querySelector('.empty');
            if (empty) empty.remove();

            const div = document.createElement('div');
            div.className = `msg ${role}`;
            div.textContent = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function streamAppend(text) {
            const container = document.getElementById('messages');
            const empty = container.querySelector('.empty');
            if (empty) empty.remove();

            let div = container.querySelector('.msg.ai.streaming');
            if (!div) {
                div = document.createElement('div');
                div.className = 'msg ai streaming';
                container.appendChild(div);
            }
            div.textContent += text;
            container.scrollTop = container.scrollHeight;
        }

        function streamFinalize() {
            const div = document.querySelector('.msg.ai.streaming');
            if (div) div.classList.remove('streaming');
        }

        // ── PTT Button ──
        const pttBtn = document.getElementById('pttBtn');
        const pttLabel = document.getElementById('pttLabel');
        let isRecording = false;
        let recordingStartTime = 0;

        pttBtn.addEventListener('click', async () => {
            isRecording = !isRecording;
            if (isRecording) {
                recordingStartTime = Date.now();
                pttBtn.textContent = '⏹';
                pttBtn.classList.add('recording');
                pttLabel.textContent = '录音中... 再点击停止';
                startFrameCapture(FRAME_INTERVAL_SPEECH);
                await startRecording();
                ws.send(JSON.stringify({ type: 'ptt_start' }));
            } else {
                pttBtn.textContent = '🎤';
                pttBtn.classList.remove('recording');
                pttLabel.textContent = '处理中...';

                const duration = (Date.now() - recordingStartTime) / 1000;
                startFrameCapture(FRAME_INTERVAL_IDLE);

                const allSamples = [];
                for (const chunk of audioChunks) {
                    for (let i = 0; i < chunk.length; i++) allSamples.push(chunk[i]);
                }
                stopRecording();

                if (allSamples.length < 16000 * 0.3) {
                    addMessage('system', '⚠️ 录音太短，请重试');
                    pttLabel.textContent = '点击开始录音';
                    return;
                }

                const frames = getFramesForLLM(duration);
                const sampleRate = window._audioSampleRate || 16000;
                const wav = encodeWAV(allSamples, sampleRate);
                const base64 = arrayBufferToBase64(wav);

                ws.send(JSON.stringify({ type: 'ptt_stop', frames: frames }));
                ws.send(JSON.stringify({ type: 'audio', data: base64, sample_rate: sampleRate }));
            }
        });

        startFrameCapture(FRAME_INTERVAL_IDLE);
        startCamera();
    </script>
</body>
</html>
